    <title>Шавки — резкий сайт о шавках</title>
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* CSS Variables — светлая тема по умолчанию */
        :root {
            --bg-body: #f5f5f5;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #121212;
            --text-secondary: #5a5a5a;
            --border-color: #e0e0e0;
            --accent: #d42a28;
            --accent-hover: #b02321;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
            --blur-bg: rgba(255,255,255,0.7);
            --header-bg: rgba(255,255,255,0.9);
            --footer-bg: #fafafa;
        }

        body.dark {
            --bg-body: #121416;
            --bg-surface: #202327;
            --bg-card: #292d32;
            --text-primary: #e6e6e6;
            --text-secondary: #a3a3a3;
            --border-color: #32373e;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
            --blur-bg: rgba(18,20,22,0.8);
            --header-bg: rgba(18,20,22,0.95);
            --footer-bg: #1a1c20;
        }

        body {
            font-family: 'Segoe UI', 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.2s;
            line-height: 1.4;
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ----- TYPOGRAPHY ----- */
        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ----- LAYOUT ----- */
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER (десктоп) */
        .header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            padding: 0 24px;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo img {
            height: 32px;
            width: auto;
            transition: transform 0.2s;
        }
        .logo:hover img { transform: scale(1.02); }

        /* Десктоп навигация */
        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .nav-links a {
            font-weight: 500;
            transition: color 0.2s;
            color: var(--text-primary);
            opacity: 0.8;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            opacity: 1;
        }

        /* Контролы (язык, тема) */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        .icon-btn:hover {
            background: var(--border-color);
        }
        .lang-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 6px 12px;
            font-weight: 500;
        }
        .lang-btn img {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        /* Мобильный нижний таб-бар (скрыт на десктопе) */
        .mobile-tabbar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
            justify-content: space-around;
            z-index: 200;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .tab-item.active {
            color: var(--accent);
        }
        .tab-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
            width: 100%;
        }

        /* Секции */
        .section {
            margin-bottom: 48px;
        }
        .section-title {
            font-size: 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Карточки (собаки / события) — как в Fonbet */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        .card-img {
            height: 180px;
            background-size: cover;
            background-position: center;
            background-color: #ddd;
        }
        .card-content {
            padding: 20px;
        }
        .card-title {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .card-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .coeffs {
            display: flex;
            gap: 12px;
        }
        .coeff {
            background: var(--accent);
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Топ-события (горизонтальный скролл) */
        .events-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }
        .event-card {
            flex: 0 0 320px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 16px;
        }

        /* Адаптив — мобильная версия (<768px) */
        @media (max-width: 767px) {
            .header-container {
                height: 56px;
            }
            .nav-links {
                display: none;
            }
            .mobile-tabbar {
                display: flex;
            }
            .main-content {
                padding: 20px 16px 80px;
            }
            .section-title {
                font-size: 24px;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Дополнительные эффекты */
        .blur-bg {
            backdrop-filter: blur(10px);
            background: var(--blur-bg);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card, .event-card {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        footer {
            background: var(--footer-bg);
            border-top: 1px solid var(--border-color);
            padding: 32px 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }
    </style>
</head>

<script>
    // ---------- БАЗА ДАННЫХ ПЕРЕВОДОВ ----------
    const translations = {
        ru: {
            nav_home: "Главная", nav_breeds: "Породы", nav_events: "События", nav_about: "О нас",
            section_top_events: "ТОП-СОБЫТИЯ", section_popular_breeds: "ПОПУЛЯРНЫЕ ПОРОДЫ",
            footer_text: "© 2025 Шавки — самый дерзкий сайт. Все права защищены. 18+",
            footer_sub: "Ставки на шавок — это не азарт, это образ жизни.",
            home_title: "Добро пожаловать в мир шавок!",
            home_desc: "Самые резкие новости, ставки и события о собаках со всего света. Будь в теме!",
            breed1_name: "Корги", breed1_desc: "Маленькие, но очень дерзкие. Любят драться и кусать за пятки.",
            breed2_name: "Хаски", breed2_desc: "Любители выть на луну и сбегать из дома. Беспощадны к диванам.",
            breed3_name: "Мопс", breed3_desc: "Вечно недовольная морда, но внутри — нежный пёсель.",
            breed4_name: "Дворняга", breed4_desc: "Истинная шавка — умная, выносливая, наглая. Лучший друг.",
            event1_title: "Чемпионат по бегу за палкой", event1_desc: "Финал. Кто быстрее: корги или хаски?", coeff1: "2.15", coeff2: "1.85",
            event2_title: "Выставка «Борзый пёс 2025»", event2_desc: "Лучшая шавка года. Принимают всех.", coeff3: "3.40", coeff4: "1.45",
            about_title: "О нас", about_text: "Мы — команда безумных любителей шавок. Сайт создан для дерзких и наглых, кто ценит настоящих собак. Ставки, прогнозы, новости — всё для вас."
        },
        en: {
            nav_home: "Home", nav_breeds: "Breeds", nav_events: "Events", nav_about: "About",
            section_top_events: "TOP EVENTS", section_popular_breeds: "POPULAR BREEDS",
            footer_text: "© 2025 Shavki — the boldest dog site. All rights reserved. 18+",
            footer_sub: "Betting on mutts is not gambling, it's a lifestyle.",
            home_title: "Welcome to the world of mutts!",
            home_desc: "The boldest news, bets and events about dogs from all over the world. Stay tuned!",
            breed1_name: "Corgi", breed1_desc: "Small but very cheeky. Love to fight and bite heels.",
            breed2_name: "Husky", breed2_desc: "Howling at the moon and escaping home. Ruthless to sofas.",
            breed3_name: "Pug", breed3_desc: "Always grumpy face, but inside a gentle pup.",
            breed4_name: "Mongrel", breed4_desc: "True mutt — smart, hardy, impudent. Best friend.",
            event1_title: "Stick chasing championship", event1_desc: "Final. Who is faster: corgi or husky?", coeff1: "2.15", coeff2: "1.85",
            event2_title: "Exhibition 'Swift dog 2025'", event2_desc: "Best mutt of the year. Everyone welcome.", coeff3: "3.40", coeff4: "1.45",
            about_title: "About us", about_text: "We are a team of crazy mutt lovers. Site made for the bold and cheeky who appreciate real dogs. Bets, predictions, news — everything for you."
        }
    };

    let currentLang = 'ru';
    let currentTheme = 'system'; // 'light', 'dark', 'system'
    let currentPage = 'home';

    // DOM элементы
    const logoImg = document.getElementById('logoImg');
    const navLinks = document.querySelectorAll('.nav-links a');
    const mobileTabs = document.querySelectorAll('.tab-item');
    const themeToggle = document.getElementById('themeToggle');
    const langToggle = document.getElementById('langToggle');
    const currentFlag = document.getElementById('currentFlag');
    const currentLangLabel = document.getElementById('currentLangLabel');
    const pageContent = document.getElementById('pageContent');

    // Функция применения темы
    function setTheme(theme) {
        currentTheme = theme;
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        localStorage.setItem('shavki_theme', theme);
    }

    // Определение системной темы
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
    systemDark.addEventListener('change', () => {
        if (currentTheme === 'system') setTheme('system');
    });

    // Загрузка темы
    const savedTheme = localStorage.getItem('shavki_theme');
    if (savedTheme && ['light','dark','system'].includes(savedTheme)) setTheme(savedTheme);
    else setTheme('system');

    // Переключение темы (циклично: system -> light -> dark)
    themeToggle.addEventListener('click', () => {
        if (currentTheme === 'system') setTheme('light');
        else if (currentTheme === 'light') setTheme('dark');
        else setTheme('system');
    });

    // Функция смены языка
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('shavki_lang', lang);
        const flagUrl = lang === 'ru' 
            ? 'https://upload.wikimedia.org/wikipedia/commons/f/f3/Flag_of_Russia.svg'
            : 'https://upload.wikimedia.org/wikipedia/commons/e/e2/Flag_of_the_United_States_%28Pantone%29.svg';
        currentFlag.src = flagUrl;
        currentLangLabel.innerText = lang === 'ru' ? 'РУС' : 'ENG';
        logoImg.src = lang === 'ru' ? '/assets/logo/Logo.png' : '/assets/logo/Logo-EN.png';
        renderPage(currentPage); // перерисовываем контент
    }

    langToggle.addEventListener('click', () => {
        const newLang = currentLang === 'ru' ? 'en' : 'ru';
        setLanguage(newLang);
    });

    // Рендер контента страницы
    function renderPage(page) {
        currentPage = page;
        const t = translations[currentLang];
        let html = '';
        if (page === 'home') {
            html = `
                <section class="section">
                    <h1 class="section-title">${t.home_title}</h1>
                    <p style="margin-bottom: 32px; font-size: 18px;">${t.home_desc}</p>
                    <div class="cards-grid">
                        <div class="card"><div class="card-img" style="background-image: url('https://images.dog.ceo/breeds/corgi-cardigan/n02113186_3720.jpg');"></div><div class="card-content"><div class="card-title">${t.breed1_name}</div><div class="card-desc">${t.breed1_desc}</div><div class="coeffs"><span class="coeff">⭐ 4.8</span></div></div></div>
                        <div class="card"><div class="card-img" style="background-image: url('https://images.dog.ceo/breeds/husky/n02110185_1004.jpg');"></div><div class="card-content"><div class="card-title">${t.breed2_name}</div><div class="card-desc">${t.breed2_desc}</div><div class="coeffs"><span class="coeff">⭐ 4.9</span></div></div></div>
                        <div class="card"><div class="card-img" style="background-image: url('https://images.dog.ceo/breeds/pug/n02110958_4070.jpg');"></div><div class="card-content"><div class="card-title">${t.breed3_name}</div><div class="card-desc">${t.breed3_desc}</div><div class="coeffs"><span class="coeff">⭐ 4.7</span></div></div></div>
                        <div class="card"><div class="card-img" style="background-image: url('https://images.dog.ceo/breeds/mountain-swiss/n02107574_228.jpg');"></div><div class="card-content"><div class="card-title">${t.breed4_name}</div><div class="card-desc">${t.breed4_desc}</div><div class="coeffs"><span class="coeff">⭐ 5.0</span></div></div></div>
                    </div>
                </section>
                <section class="section">
                    <h2 class="section-title">🔥 ${t.section_top_events}</h2>
                    <div class="events-scroll">
                        <div class="event-card"><h3>${t.event1_title}</h3><p>${t.event1_desc}</p><div class="coeffs"><span class="coeff">${t.coeff1}</span><span class="coeff">${t.coeff2}</span></div></div>
                        <div class="event-card"><h3>${t.event2_title}</h3><p>${t.event2_desc}</p><div class="coeffs"><span class="coeff">${t.coeff3}</span><span class="coeff">${t.coeff4}</span></div></div>
                        <div class="event-card"><h3>🏆 Собачья битва</h3><p>Кто громче лает? Corgi vs Husky</p><div class="coeffs"><span class="coeff">2.30</span><span class="coeff">1.65</span></div></div>
                    </div>
                </section>
                <section class="section">
                    <h2 class="section-title">🐾 ${t.section_popular_breeds}</h2>
                    <div class="cards-grid">
                        ${[1,2,3,4].map(i => `<div class="card"><div class="card-img" style="background-image: url('https://placedog.net/300/200?random=${i}');"></div><div class="card-content"><div class="card-title">Порода ${i}</div><div class="card-desc">Дерзкая и беспощадная шавка.</div><div class="coeffs"><span class="coeff">Ставка ${i}.55</span></div></div></div>`).join('')}
                    </div>
                </section>
            `;
        } else if (page === 'breeds') {
            html = `<h1 class="section-title">🐕 ${t.nav_breeds}</h1><div class="cards-grid">${[1,2,3,4,5,6].map(i => `<div class="card"><div class="card-img" style="background-image: url('https://placedog.net/300/200?breed=${i}');"></div><div class="card-content"><div class="card-title">Шавка #${i}</div><div class="card-desc">Описание: наглая, резкая, любит кусать.</div><div class="coeffs"><span class="coeff">Кэф ${(i+1).toFixed(1)}</span></div></div></div>`).join('')}</div>`;
        } else if (page === 'events') {
            html = `<h1 class="section-title">⚡ ${t.section_top_events}</h1><div class="events-scroll" style="flex-wrap: wrap;">${[1,2,3,4].map(i => `<div class="event-card" style="flex: 1 1 280px;"><h3>Событие ${i}</h3><p>Описание крутого шавко-события</p><div class="coeffs"><span class="coeff">${(i+1).toFixed(2)}</span><span class="coeff">${(i+2).toFixed(2)}</span></div></div>`).join('')}</div>`;
        } else if (page === 'about') {
            html = `<h1 class="section-title">ℹ️ ${t.about_title}</h1><div style="background: var(--bg-card); border-radius: 24px; padding: 32px; max-width: 800px;"><p style="font-size: 18px; line-height: 1.5;">${t.about_text}</p><br/><p>Контакты: @shavki_support (Telegram) | vk.com/shavki</p><p>Наши партнёры: все шавки планеты.</p></div>`;
        }
        pageContent.innerHTML = html;
        updateActiveNav(page);
    }

    function updateActiveNav(page) {
        navLinks.forEach(link => {
            if (link.dataset.page === page) link.classList.add('active');
            else link.classList.remove('active');
        });
        mobileTabs.forEach(tab => {
            if (tab.dataset.page === page) tab.classList.add('active');
            else tab.classList.remove('active');
        });
    }

    // Обработка кликов по навигации
    function initNavigation() {
        const navItems = [...navLinks, ...mobileTabs];
        navItems.forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const page = el.dataset.page;
                if (page) {
                    renderPage(page);
                    history.pushState({ page }, '', `/${page === 'home' ? '' : page}`);
                }
            });
        });
        window.addEventListener('popstate', (e) => {
            const path = window.location.pathname.slice(1);
            const page = path === '' ? 'home' : (['breeds','events','about'].includes(path) ? path : 'home');
            renderPage(page);
        });
        const initialPath = window.location.pathname.slice(1);
        const initialPage = initialPath === '' ? 'home' : (['breeds','events','about'].includes(initialPath) ? initialPath : 'home');
        renderPage(initialPage);
    }

    // Загрузка сохраненного языка
    const savedLang = localStorage.getItem('shavki_lang');
    if (savedLang && (savedLang === 'ru' || savedLang === 'en')) setLanguage(savedLang);
    else setLanguage('ru');

    initNavigation();
</script>
</body>
</html>
